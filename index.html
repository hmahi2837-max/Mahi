<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesyha ❤️ Hasnain</title>

<style>
body{
    margin:0;
    padding:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.box{
    text-align:center;
}

h1{
    color:#ff00ff;
    font-size:50px;
    text-shadow:0 0 20px #ff00ff;
}

h2{
    color:#00ffff;
    font-size:35px;
    text-shadow:0 0 15px #00ffff;
}

.heart{
    font-size:60px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="box">
    <h1>★彡 Aesyha 彡★</h1>
    <div class="heart">❤️</div>
    <h2>★彡 Hasnain 彡★</h2>
</div>

</body>
</html>
